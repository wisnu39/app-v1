# ============================================================
# Adhitama ERP — Redis Configuration
# ============================================================

# ─── Network ─────────────────────────────────────────────────
# Bind to all interfaces inside container (Docker network only)
bind 0.0.0.0

# Default Redis port
port 6379

# ─── Authentication ──────────────────────────────────────────
# Password set via requirepass — value injected via Docker env
# requirepass is handled via command: in docker-compose.yml
# so we do NOT hardcode it here (SECURITY_DESIGN.md compliance)

# ─── Persistence ─────────────────────────────────────────────
# RDB snapshot — save to disk for development durability
# Format: save <seconds> <changes>
save 900 1
save 300 10
save 60 10000

# RDB file name and directory
dbfilename dump.rdb
dir /data

# ─── Memory ──────────────────────────────────────────────────
# Max memory — reasonable default for dev
maxmemory 256mb

# Eviction policy: remove least recently used keys when full
# Suitable for session/cache use case (ARCHITECTURE.md)
maxmemory-policy allkeys-lru

# ─── Logging ─────────────────────────────────────────────────
# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (Docker captures it)
logfile ""

# ─── Connection ──────────────────────────────────────────────
# Max simultaneous clients
maxclients 100

# Close idle connections after N seconds (0 = disabled)
timeout 300

# TCP keepalive
tcp-keepalive 60

# ─── Performance ─────────────────────────────────────────────
# Disable transparent huge pages warning suppression
# (set at OS level in production)
# activerehashing yes

# ─── Security ────────────────────────────────────────────────
# Disable dangerous commands in production (rename to empty)
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command DEBUG ""
# Commented for dev — enable in production override config

# ─── Database count ──────────────────────────────────────────
# Number of Redis databases (0 = default)
databases 4
